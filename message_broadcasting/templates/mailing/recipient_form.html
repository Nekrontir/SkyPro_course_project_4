{% extends 'base.html' %}
{% block title %}{% if object %}Редактирование{% else %}Создание{% endif %} получателя{% endblock %}

{% block content %}
<h1>{% if object %}Редактировать получателя{% else %}Добавить получателя{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'mailing:recipient_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
