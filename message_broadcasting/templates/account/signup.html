{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <h1>Регистрация</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Зарегистрироваться</button>
        </form>
        <p class="mt-2">
            Уже есть аккаунт? <a href="{% url 'account_login' %}">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
