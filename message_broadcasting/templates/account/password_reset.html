{% extends 'base.html' %}
{% block title %}Сброс пароля{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <h1>Сброс пароля</h1>
        <p>Введите ваш email, и мы отправим ссылку для сброса.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Сбросить пароль</button>
        </form>
    </div>
</div>
{% endblock %}
