{% extends 'base.html' %}
{% block title %}Новый пароль{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <h1>Новый пароль</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Сохранить пароль</button>
        </form>
    </div>
</div>
{% endblock %}
